# Supabase CLI local-dev config (weather-edge).
project_id = "weather-edge"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"

[edge_runtime]
enabled = true
policy = "per_worker"
